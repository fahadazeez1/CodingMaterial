spring.application.name=Api-Gateway
server.port=8084

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=compony-ms-1
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://COMPONY-MS-1
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/compony/**

spring.cloud.gateway.server.webmvc.routes[1].id=Job-ms-1
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://JOB-MS-1
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/job/**

spring.cloud.gateway.server.webmvc.routes[2].id=review-ms-1
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://REVIEW-MS-1
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/review/**

management.tracing.sampling.probability=1.0